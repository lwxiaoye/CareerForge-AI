# === High-Concurrency Tuning ===
# Rate limiting zones - defined at http level (outside server block)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=200r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
# === End High-Concurrency Tuning ===

server {
  # Gzip compression for static assets
  gzip on;
  gzip_vary on;
  gzip_min_length 512;
  gzip_proxied any;
  gzip_comp_level 5;
  gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss image/svg+xml;

  # Connection tuning
  keepalive_timeout 65;
  keepalive_requests 1000;

  listen 80;
  server_name _;

  # Allow file uploads up to 25MB (banner 5MB, resume 20MB)
  client_max_body_size 25m;

  # Rate limit + connection limit
  limit_req zone=api_limit burst=100 nodelay;
  limit_conn conn_limit 50;

  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    # Proxy buffer tuning for high concurrency
    proxy_buffering on;
    proxy_buffer_size 16k;
    proxy_buffers 64 16k;
    proxy_busy_buffers_size 32k;
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    # API-specific rate limit
    limit_req zone=api_limit burst=100 nodelay;
    limit_conn conn_limit 30;
    proxy_pass http://backend:8000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Feedback screenshots
  location /feedback-images/ {
    proxy_pass http://backend:8000/feedback-images/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /static/ {
    proxy_pass http://backend:8000/static/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /docs {
    proxy_pass http://backend:8000/docs;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /redoc {
    proxy_pass http://backend:8000/redoc;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /openapi.json {
    proxy_pass http://backend:8000/openapi.json;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /data/ {
    proxy_pass http://backend:8000/data/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Vite emits content-hashed filenames under /assets/ (e.g. index-DJLIHUCJ.js).
  # Filenames change on every build so they can be cached forever on the browser.
  location /assets/ {
    access_log off;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  # HTML entry must NOT be long-cached — the browser must revalidate to pick up
  # new hashed asset filenames on each deploy.
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}