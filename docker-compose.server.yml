services:
  mysql:
    image: mysql:8.4
    container_name: careerforge-mysql
    command:
      - --mysql-native-password=ON
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max-connections=100
      - --innodb-buffer-pool-size=192M
      - --innodb-flush-log-at-trx-commit=2
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-root-password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-zhipei_agent}
      MYSQL_USER: ${MYSQL_USER:-zhipei}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change-db-password}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: careerforge-redis
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-change-redis-password}"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD} ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  backend:
    image: careerforge-ai-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: careerforge-backend
    env_file:
      - ./backend/.env.docker
    environment:
      - WEB_CONCURRENCY=1
      - INTERVIEW_KNOWLEDGE_BASE_DIR=/app/knowledge-base
      - INTERVIEW_USE_LOCAL_PADDLEOCR=true
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - app-data:/app/data
      - ./knowledge-base:/app/knowledge-base:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=5).read()\"",
        ]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  frontend:
    image: careerforge-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    container_name: careerforge-frontend
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  proxy:
    image: careerforge-frontend:latest
    container_name: careerforge-proxy
    depends_on:
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/server.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certs:/etc/nginx/certs:ro
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:
  app-data:
