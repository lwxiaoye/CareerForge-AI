services:
  mysql:
    image: mysql:8.4
    container_name: zhipei-mysql
    command:
      - --mysql-native-password=ON
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max-connections=200
      - --innodb-buffer-pool-size=256M
      - --innodb-flush-log-at-trx-commit=2
      - --innodb-log-file-size=128M
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: zhipei_agent
      MYSQL_USER: zhipei
      MYSQL_PASSWORD: zhipei123456
    ports:
      - "${MYSQL_HOST_PORT:-3308}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot123456"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G

  redis:
    image: redis:7-alpine
    container_name: zhipei-redis
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "redis123456", "--tcp-backlog", "511", "--maxclients", "1000", "--timeout", "300"]
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a redis123456 ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zhipei-backend
    env_file:
      - ./backend/.env.docker
    environment:
      - WEB_CONCURRENCY=1
      - INTERVIEW_KNOWLEDGE_BASE_DIR=/app/knowledge-base
      - INTERVIEW_USE_LOCAL_PADDLEOCR=true
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8001:8000"
    volumes:
      - skill-data:/app/data
      - "./knowledge-base:/app/knowledge-base:ro"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=5).read()\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 2G

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zhipei-worker
    env_file:
      - ./backend/.env.docker
    environment:
      - INTERVIEW_KNOWLEDGE_BASE_DIR=/app/knowledge-base
      - INTERVIEW_USE_LOCAL_PADDLEOCR=true
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - skill-data:/app/data
    # Override Dockerfile ENTRYPOINT (which runs uvicorn) so the worker image
    # actually runs rq worker instead of a duplicate backend on port 8000.
    entrypoint: ["rq", "worker", "pdf_jobs", "--url", "redis://:redis123456@redis:6379/0"]
    # Worker is healthy if at least one RQ worker is registered with Redis (idle or busy).
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "from rq import Worker; from redis import Redis;
          r=Redis.from_url('redis://:redis123456@redis:6379/0');
          ws=[w for w in Worker.all(connection=r) if w.state in ('idle','busy')];
          exit(0 if ws else 1)"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    container_name: zhipei-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M

volumes:
  mysql-data:
  redis-data:
  skill-data:
